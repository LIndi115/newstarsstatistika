<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEW STARS - Pro Stats Kit</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #004499; --primary-light: #005bc4; --accent: #ffdd00; 
            --bg-body: #f0f4f8; --bg-card: #ffffff; --text-dark: #1a1f36;
            --text-muted: #697386; --input-bg: #f3f6f9; --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.1);
            --radius-md: 12px; --radius-lg: 20px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-body); color: var(--text-dark); padding: 15px; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--primary) 0%, #002244 100%); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 40px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); text-align: center; width: 90%; max-width: 400px; }
        #appContent { display: none; max-width: 1200px; margin: 0 auto; }
        .app-header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); color: white; padding: 20px; border-radius: var(--radius-lg); text-align: center; margin-bottom: 20px; cursor: pointer; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 12px 20px; border-radius: 50px; border: none; background: #ddd; cursor: pointer; font-weight: 600; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); color: white; }
        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .stat-card { background: white; padding: 25px; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; color: var(--primary); }
        input, select { width: 100%; padding: 14px; background: var(--input-bg); border: 2px solid transparent; border-radius: var(--radius-md); margin-bottom: 15px; font-family: inherit; }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 16px; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; width: 100%; }
        .modern-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        .modern-table th, .modern-table td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .total-box { background: var(--primary); color: white; padding: 15px; border-radius: 12px; text-align: center; }
        .win { color: #10b981; font-weight: 800; } .draw { color: #f59e0b; font-weight: 800; } .loss { color: #ef4444; font-weight: 800; }
        .loading-spinner { display: none; color: var(--primary); font-weight: 600; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <i class="fas fa-star" style="font-size: 3rem; color: var(--accent); margin-bottom: 15px;"></i>
        <h2>NEW STARS</h2>
        <input type="password" id="password" placeholder="Fjalëkalimi">
        <button class="btn-submit" onclick="checkLogin()">HYR</button>
    </div>
</div>

<div id="appContent">
    <header class="app-header" onclick="location.reload()"><h1>NEW STARS <span>PRO</span></h1></header>

    <div id="mainNav" class="nav-tabs">
        <button class="tab-btn active" onclick="showTab('tabLojtaret')">Lojtarët</button>
        <button class="tab-btn" onclick="showTab('tabKlubi')">Ndeshjet e Klubit</button>
        <button class="tab-btn" onclick="showTab('tabStatistikat')">Statistikat Shkollës</button>
    </div>

    <div id="tabLojtaret" class="tab-content">
        <div class="main-grid">
            <div class="stat-card">
                <h3><i class="fas fa-user-plus"></i> Regjistro Lojtarin</h3>
                <label>Emri i Lojtarit</label>
                <input type="text" id="regEmri" placeholder="Emri dhe Mbiemri">
                <button class="btn-submit" onclick="regjistroLojtar()">SHTO LOJTARIN</button>
            </div>
            <div class="stat-card">
                <h3><i class="fas fa-edit"></i> Shto Statistika</h3>
                <label>Zgjidh Lojtarin</label>
                <select id="selLojtari"></select>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><label>Kategoria</label><select id="lKat"><option>U9</option><option>U11</option><option>U13</option><option>U15</option><option>U17</option><option>U19</option></select></div>
                    <div><label>Sezoni</label><select id="lSez" class="sezoni-select"></select></div>
                </div>
                <label>Kundërshtari</label>
                <input type="text" id="lKun" placeholder="KF Prishtina...">
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <div><label>Golla</label><input type="number" id="lG" value="0"></div>
                    <div><label>Asistime</label><input type="number" id="lA" value="0"></div>
                    <div><label>Minuta</label><input type="number" id="lM" value="0"></div>
                </div>
                <button class="btn-submit" style="background:#10b981;" onclick="ruajStatLojtari()">RUAJ STATISTIKAT</button>
            </div>
        </div>
        <div class="stat-card">
            <input type="text" id="search" onkeyup="kerkoLojtarin()" placeholder="Kërko lojtarin me emër...">
            <table class="modern-table" id="tabelaLojtareve"></table>
        </div>
    </div>

    <div id="tabKlubi" class="tab-content" style="display:none;">
        <div class="stat-card">
            <h3><i class="fas fa-trophy"></i> Regjistro Ndeshjen e Shkollës</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>Kategoria</label><select id="kKat"><option>U9</option><option>U11</option><option>U13</option><option>U15</option><option>U17</option><option>U19</option></select></div>
                <div><label>Sezoni</label><select id="kSez" class="sezoni-select"></select></div>
            </div>
            <label>Data</label>
            <input type="date" id="kData">
            <label>Kundërshtari</label>
            <input type="text" id="kKun" placeholder="KF Prishtina">
            <label>Rezultati (New Stars)</label>
            <select id="kRez">
                <option value="Fitore">Fitore</option>
                <option value="Barazim">Barazim</option>
                <option value="Humbje">Humbje</option>
            </select>
            <button class="btn-submit" onclick="ruajNdeshjeKlubi()">RUAJ NDESHJEN</button>
        </div>
    </div>

    <div id="tabStatistikat" class="tab-content" style="display:none;">
        <div class="stat-card">
            <h3><i class="fas fa-chart-bar"></i> Filtro Statistikat</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>Kategoria</label><select id="fKat" onchange="shfaqStatsKlubi()"><option value="Gjitha">Të gjitha</option><option>U9</option><option>U11</option><option>U13</option><option>U15</option><option>U17</option><option>U19</option></select></div>
                <div><label>Sezoni</label><select id="fSez" class="sezoni-select" onchange="shfaqStatsKlubi()"></select></div>
            </div>
            
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top:20px; text-align:center;">
                <div style="background:#dcfce7; padding:15px; border-radius:10px;"><small>Fitore</small><h2 id="totalF" class="win">0</h2></div>
                <div style="background:#fef3c7; padding:15px; border-radius:10px;"><small>Barazim</small><h2 id="totalB" class="draw">0</h2></div>
                <div style="background:#fee2e2; padding:15px; border-radius:10px;"><small>Humbje</small><h2 id="totalH" class="loss">0</h2></div>
            </div>

            <table class="modern-table">
                <thead><tr><th>Data</th><th>Kat.</th><th>Kundërshtari</th><th>Rezultati</th><th>Fshi</th></tr></thead>
                <tbody id="listaNdeshjeveKlubi"></tbody>
            </table>
        </div>
    </div>

    <div id="pProfile" class="tab-content" style="display:none;">
        <div class="stat-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 id="pEmri" style="color:var(--primary)"></h2>
                <button onclick="mbyllProfilin()" style="padding:10px 20px; border-radius:10px; border:none; background:#eee; cursor:pointer;">Kthehu</button>
            </div>
            <label>Filtro sipas Sezonit</label>
            <select id="pSezFiltri" class="sezoni-select" onchange="filtroProfilin()"></select>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top:10px; margin-bottom:20px;">
                <div class="total-box"><small>Golla</small><h2 id="pTotalG">0</h2></div>
                <div class="total-box" style="background:#005bc4;"><small>Asistime</small><h2 id="pTotalA">0</h2></div>
                <div class="total-box" style="background:#007bff;"><small>Minuta</small><h2 id="pTotalM">0</h2></div>
            </div>
            <h3>Historiku i Ndeshjeve</h3>
            <table class="modern-table">
                <thead><tr><th>Data</th><th>Kat.</th><th>Ndeshja</th><th>G</th><th>A</th><th>Min</th><th>Fshi</th></tr></thead>
                <tbody id="pHistory"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Konfigurimi i Firebase që dërgove
    const firebaseConfig = {
        apiKey: "AIzaSyBh_7bwfNbKbscPSW1ZN9Y_UvAntsjl9Wg",
        authDomain: "herolind-6ca5f.firebaseapp.com",
        databaseURL: "https://herolind-6ca5f-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "herolind-6ca5f",
        storageBucket: "herolind-6ca5f.firebasestorage.app",
        messagingSenderId: "893085364638",
        appId: "1:893085364638:web:2db59e6ec72ad7e7c1a68f"
    };

    // Inicializimi
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lojtaret = [];
    let ndeshjetLojtareve = [];
    let ndeshjetKlubit = [];
    let lojtariAktual = "";

    function checkLogin() {
        if(document.getElementById('password').value === "newstars2026") {
            document.getElementById('loginOverlay').style.display = "none";
            document.getElementById('appContent').style.display = "block";
            initApp();
        }
    }

    function initApp() {
        // Sezonet
        const selectsSezoni = document.querySelectorAll('.sezoni-select');
        let sezoneHTML = "";
        for (let vit = 2024; vit <= 2030; vit++) {
            let sez = `${vit}/${vit + 1}`;
            sezoneHTML += `<option value="${sez}">${sez}</option>`;
        }
        selectsSezoni.forEach(sel => sel.innerHTML = sezoneHTML);
        document.getElementById('kData').valueAsDate = new Date();

        // Leximi i të dhënave nga Firebase në kohë reale
        db.ref('lojtaret').on('value', snapshot => {
            lojtaret = [];
            snapshot.forEach(child => { lojtaret.push({id: child.key, ...child.val()}); });
            renditLojtaret();
        });

        db.ref('ndeshjetLojtareve').on('value', snapshot => {
            ndeshjetLojtareve = [];
            snapshot.forEach(child => { ndeshjetLojtareve.push({id: child.key, ...child.val()}); });
            if(lojtariAktual) filtroProfilin();
        });

        db.ref('ndeshjetKlubit').on('value', snapshot => {
            ndeshjetKlubit = [];
            snapshot.forEach(child => { ndeshjetKlubit.push({id: child.key, ...child.val()}); });
            shfaqStatsKlubi();
        });
    }

    // --- FUNKSIONET E LOJTAREVE ---
    function regjistroLojtar() {
        let e = document.getElementById('regEmri').value.trim();
        if(!e) return;
        db.ref('lojtaret').push({ emri: e });
        document.getElementById('regEmri').value = "";
    }

    function renditLojtaret() {
        const sel = document.getElementById('selLojtari');
        const tab = document.getElementById('tabelaLojtareve');
        sel.innerHTML = '<option value="">-- Zgjidh Lojtarin --</option>';
        tab.innerHTML = "";
        lojtaret.sort((a,b)=>a.emri.localeCompare(b.emri)).forEach(l => {
            sel.innerHTML += `<option value="${l.emri}">${l.emri}</option>`;
            tab.innerHTML += `<tr><td style="text-align:left; font-weight:600; cursor:pointer; color:var(--primary);" onclick="hapProfilin('${l.emri}')"><i class="fas fa-external-link-alt"></i> ${l.emri}</td><td><button onclick="fshijLojtar('${l.id}', '${l.emri}')">🗑️</button></td></tr>`;
        });
    }

    function ruajStatLojtari() {
        let st = {
            emri: document.getElementById('selLojtari').value,
            kat: document.getElementById('lKat').value,
            sez: document.getElementById('lSez').value,
            kun: document.getElementById('lKun').value,
            g: parseInt(document.getElementById('lG').value) || 0,
            a: parseInt(document.getElementById('lA').value) || 0,
            m: parseInt(document.getElementById('lM').value) || 0,
            data: new Date().toLocaleDateString('sq-AL')
        };
        if(!st.emri || !st.kun) return alert("Plotëso fushat!");
        db.ref('ndeshjetLojtareve').push(st);
        alert("Statistikat u ruajtën!");
        document.getElementById('lKun').value = "";
        document.getElementById('lG').value = 0; document.getElementById('lA').value = 0; document.getElementById('lM').value = 0;
    }

    // --- PROFILI DHE FILTRIMI ---
    function hapProfilin(emri) {
        lojtariAktual = emri;
        document.getElementById('tabLojtaret').style.display = "none";
        document.getElementById('mainNav').style.display = "none";
        document.getElementById('pProfile').style.display = "block";
        document.getElementById('pEmri').innerText = emri;
        filtroProfilin();
    }

    function filtroProfilin() {
        const sezoni = document.getElementById('pSezFiltri').value;
        const body = document.getElementById('pHistory');
        body.innerHTML = "";
        let tg = 0, ta = 0, tm = 0;
        const ndeshjet = ndeshjetLojtareve.filter(n => n.emri === lojtariAktual && n.sez === sezoni);
        ndeshjet.forEach(n => {
            tg += n.g; ta += n.a; tm += n.m;
            body.innerHTML += `<tr><td>${n.data}</td><td>${n.kat}</td><td>${n.kun}</td><td>${n.g}</td><td>${n.a}</td><td>${n.m}</td><td><button onclick="fshijStatLojtari('${n.id}')">X</button></td></tr>`;
        });
        document.getElementById('pTotalG').innerText = tg;
        document.getElementById('pTotalA').innerText = ta;
        document.getElementById('pTotalM').innerText = tm;
    }

    function mbyllProfilin() {
        lojtariAktual = "";
        document.getElementById('pProfile').style.display = "none";
        document.getElementById('mainNav').style.display = "flex";
        document.getElementById('tabLojtaret').style.display = "block";
    }

    // --- NDESHJET E KLUBIT ---
    function ruajNdeshjeKlubi() {
        let nd = {
            kat: document.getElementById('kKat').value,
            sez: document.getElementById('kSez').value,
            data: document.getElementById('kData').value,
            kun: document.getElementById('kKun').value,
            rez: document.getElementById('kRez').value
        };
        if(!nd.kun || !nd.data) return alert("Plotëso të dhënat!");
        db.ref('ndeshjetKlubit').push(nd);
        alert("Ndeshja u regjistrua!");
        document.getElementById('kKun').value = "";
    }

    function shfaqStatsKlubi() {
        const kat = document.getElementById('fKat').value;
        const sez = document.getElementById('fSez').value;
        const lista = document.getElementById('listaNdeshjeveKlubi');
        lista.innerHTML = "";
        let f = 0, b = 0, h = 0;
        let filtrimi = ndeshjetKlubit.filter(n => (kat === "Gjitha" || n.kat === kat) && n.sez === sez);
        filtrimi.sort((x,y)=> new Date(y.data) - new Date(x.data)).forEach(n => {
            if(n.rez === "Fitore") f++; else if(n.rez === "Barazim") b++; else h++;
            let klasi = n.rez === "Fitore" ? "win" : (n.rez === "Barazim" ? "draw" : "loss");
            lista.innerHTML += `<tr><td>${n.data}</td><td><b>${n.kat}</b></td><td>vs ${n.kun}</td><td class="${klasi}">${n.rez}</td><td><button onclick="fshijNdeshjeKlubi('${n.id}')">X</button></td></tr>`;
        });
        document.getElementById('totalF').innerText = f;
        document.getElementById('totalB').innerText = b;
        document.getElementById('totalH').innerText = h;
    }

    // --- FSHIRJA DHE NAVIGIMI ---
    function fshijNdeshjeKlubi(id) { if(confirm("Fshij ndeshjen?")) db.ref('ndeshjetKlubit').child(id).remove(); }
    function fshijStatLojtari(id) { if(confirm("Fshij statistikën?")) db.ref('ndeshjetLojtareve').child(id).remove(); }
    function fshijLojtar(id, emri) {
        if(confirm(`A jeni i sigurt? Duke fshirë lojtarin ${emri}, do të fshihen edhe të gjitha statistikat e tij.`)) {
            db.ref('lojtaret').child(id).remove();
            // Fshi edhe statistikat e tij
            ndeshjetLojtareve.filter(n => n.emri === emri).forEach(n => db.ref('ndeshjetLojtareve').child(n.id).remove());
        }
    }

    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = "none");
        document.getElementById(id).style.display = "block";
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function kerkoLojtarin() {
        let v = document.getElementById('search').value.toLowerCase();
        let rows = document.getElementById('tabelaLojtareve').rows;
        for(let i=0; i<rows.length; i++) rows[i].style.display = rows[i].innerText.toLowerCase().includes(v) ? "" : "none";
    }
</script>
</body>
</html>
